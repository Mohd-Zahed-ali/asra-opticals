<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Your Cart — Asra Optical Palace</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a96e;--dark:#1a1a1a;--cream:#f9f6f0;--border:#e0d5c5;--mid:#4a4a4a}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh}
.topbar{background:var(--dark);height:65px;padding:0 50px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:20px;letter-spacing:2px;text-decoration:none}
.topbar a{color:#aaa;text-decoration:none;font-size:13px;transition:color .2s}
.topbar a:hover{color:var(--gold)}
.page-header{background:white;border-bottom:1px solid var(--border);padding:30px 60px}
.page-header h1{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:400}
.page-header p{color:var(--mid);font-size:13px;margin-top:4px}
.container{max-width:1100px;margin:35px auto;padding:0 25px;display:grid;grid-template-columns:1fr 340px;gap:25px;align-items:start}
/* Cart Items */
.cart-items{background:white;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.cart-item{display:grid;grid-template-columns:100px 1fr auto;gap:20px;padding:22px 25px;border-bottom:1px solid var(--border);align-items:center}
.cart-item:last-child{border-bottom:none}
.item-img{width:100px;height:80px;object-fit:cover;border-radius:3px}
.item-info .brand{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.item-info h4{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;margin-bottom:6px}
.item-info .price{font-size:15px;color:var(--mid)}
.qty-controls{display:flex;align-items:center;gap:0;margin-top:10px;border:1px solid var(--border);width:fit-content;border-radius:3px;overflow:hidden}
.qty-btn{width:32px;height:32px;background:var(--cream);border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--dark);transition:background .2s}
.qty-btn:hover{background:#e0d5c5}
.qty-num{width:36px;text-align:center;font-size:14px;font-weight:500;line-height:32px;border-left:1px solid var(--border);border-right:1px solid var(--border)}
.item-right{text-align:right}
.subtotal{font-size:17px;font-weight:600;margin-bottom:10px}
.remove-btn{background:none;border:none;color:#ccc;font-size:12px;cursor:pointer;text-decoration:underline;letter-spacing:.5px}
.remove-btn:hover{color:#e74c3c}
/* Summary */
.summary{background:white;border:1px solid var(--border);border-radius:4px;padding:28px;position:sticky;top:20px}
.summary h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.summary-row{display:flex;justify-content:space-between;font-size:13px;color:var(--mid);margin-bottom:10px}
.summary-row.total{font-size:18px;font-weight:600;color:var(--dark);padding-top:14px;border-top:1px solid var(--border);margin-top:8px}
.checkout-btn{display:block;width:100%;padding:15px;background:var(--dark);color:var(--gold);text-align:center;text-decoration:none;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border-radius:3px;margin-top:18px;transition:background .2s}
.checkout-btn:hover{background:#2d2d2d}
.continue-btn{display:block;text-align:center;margin-top:12px;color:var(--mid);font-size:13px;text-decoration:none}
.continue-btn:hover{color:var(--dark)}
/* Empty */
.empty{text-align:center;padding:80px 25px}
.empty .icon{font-size:64px;margin-bottom:20px}
.empty h2{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;margin-bottom:10px}
.empty p{color:var(--mid);font-size:14px;margin-bottom:25px}
.shop-btn{display:inline-block;padding:13px 30px;background:var(--dark);color:var(--gold);text-decoration:none;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;border-radius:3px}
@media(max-width:750px){.container{grid-template-columns:1fr}.cart-item{grid-template-columns:80px 1fr}}
</style>
</head>
<body>
<nav class="topbar">
  <a href="/" class="logo">ASRA OPTICAL PALACE</a>
  <div style="display:flex;gap:20px">
    <a href="/">← Shop</a>
    <a href="/wishlist">Wishlist</a>
    <a href="/profile">Profile</a>
    <form action="/logout" method="post" style="margin:0;padding:0">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" style="background:none;border:none;cursor:pointer;color:#e74c3c;font-size:13px;padding:10px 18px;width:100%;text-align:left">🚪 Logout</button>
        </form>
  </div>
</nav>

<div class="page-header">
  <h1>Shopping Cart</h1>
  <p th:if="${!#lists.isEmpty(products)}" th:text="${#lists.size(products)} + ' item(s) in your cart'"></p>
</div>

<div class="container" th:if="${!#lists.isEmpty(products)}">
  <div class="cart-items">
    <div th:each="product : ${products}" class="cart-item">
      <img class="item-img" th:src="@{'/uploads/' + ${product.imageName}}" th:alt="${product.name}">
      <div class="item-info">
        <div class="brand" th:text="${product.brand}"></div>
        <h4 th:text="${product.name}"></h4>
        <div class="price">₹ <span th:text="${product.price}"></span> each</div>
        <div class="qty-controls">
          <a th:href="@{'/cart/decrease/' + ${product.id}}" class="qty-btn">−</a>
          <div class="qty-num" th:text="${cart[product.id]}">1</div>
          <a th:href="@{'/cart/increase/' + ${product.id}}" class="qty-btn">+</a>
        </div>
      </div>
      <div class="item-right">
        <div class="subtotal">₹ <span th:text="${cart[product.id] * product.price}"></span></div>
        <form th:action="@{'/cart/remove/' + ${product.id}}" method="get">
          <button type="submit" class="remove-btn">Remove</button>
        </form>
      </div>
    </div>
  </div>

  <div class="summary">
    <h3>Order Summary</h3>
    <div class="summary-row"><span>Subtotal</span><span>₹ <span th:text="${total}"></span></span></div>
    <div class="summary-row"><span>Delivery</span><span style="color:green">FREE</span></div>
    <div class="summary-row total"><span>Total</span><span>₹ <span th:text="${total}"></span></span></div>
    <a href="/checkout" class="checkout-btn">Proceed to Checkout →</a>
    <a href="/" class="continue-btn">← Continue Shopping</a>
  </div>
</div>

<div class="empty" th:if="${#lists.isEmpty(products)}">
  <div class="icon">🛒</div>
  <h2>Your cart is empty</h2>
  <p>Looks like you haven't added any frames yet.</p>
  <a href="/" class="shop-btn">Browse Collection →</a>
</div>
</body>
</html>
