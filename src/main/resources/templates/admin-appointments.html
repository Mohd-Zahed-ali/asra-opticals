<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Appointments — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a96e;--dark:#1a1a1a;--cream:#f9f6f0;--border:#e0d5c5;--sidebar:240px}
body{font-family:'DM Sans',sans-serif;background:var(--cream);display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:var(--dark);position:fixed;top:0;left:0;
  height:100vh;display:flex;flex-direction:column;z-index:100}
.sidebar-logo{padding:25px 20px;border-bottom:1px solid #2d2d2d;text-align:center}
.sidebar-logo .brand{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold);letter-spacing:1.5px}
.sidebar-logo .role{font-size:10px;color:#666;letter-spacing:2px;margin-top:3px}
.sidebar-nav{flex:1;padding:20px 0}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;
  color:#aaa;text-decoration:none;font-size:13px;transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{color:white;background:#2a2a2a}
.nav-item.active{color:var(--gold);background:#242424;border-left-color:var(--gold)}
.sidebar-footer{padding:20px;border-top:1px solid #2d2d2d}
.sidebar-footer a{display:block;color:#aaa;text-decoration:none;font-size:13px;padding:6px 0}
.sidebar-footer a:hover{color:var(--gold)}
.main{margin-left:var(--sidebar);flex:1}
.topbar{background:white;padding:15px 35px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.topbar h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400}
.content{padding:30px 35px}
.card{background:white;border:1px solid var(--border);border-radius:4px}
.card-header{padding:18px 25px;border-bottom:1px solid var(--border)}
.card-header h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400}
table{width:100%;border-collapse:collapse}
th{padding:12px 18px;text-align:left;font-size:11px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--mid,#4a4a4a);background:var(--cream);font-weight:500}
td{padding:13px 18px;border-top:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:hover td{background:#fdfbf8}
.badge{display:inline-block;padding:3px 10px;border-radius:2px;font-size:11px;
  letter-spacing:1px;font-weight:600;text-transform:uppercase}
.badge-PENDING{background:#fff3cd;color:#856404}
.badge-CONFIRMED{background:#d4edda;color:#155724}
.badge-CANCELLED{background:#f8d7da;color:#721c24}
.badge-COMPLETED{background:#d1ecf1;color:#0c5460}
select{padding:6px 10px;border:1px solid var(--border);border-radius:3px;
  font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;background:white}
button[type=submit]{padding:6px 14px;background:var(--dark);color:var(--gold);
  border:none;border-radius:3px;font-size:12px;cursor:pointer;font-weight:600;margin-left:6px}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="brand">ASRA OPTICAL</div>
    <div class="role">ADMIN PANEL</div>
  </div>
  <nav class="sidebar-nav">
    <a href="/admin/dashboard" class="nav-item">📊 Dashboard</a>
    <a href="/admin/add-product" class="nav-item">➕ Add Product</a>
    <a href="/admin/products" class="nav-item">📦 Products</a>
    <a href="/admin/orders" class="nav-item">🛒 Orders</a>
    <a href="/admin/appointments" class="nav-item active">📅 Appointments</a>
    <a href="/profile" class="nav-item">👤 My Profile</a>
  </nav>
  <div class="sidebar-footer">
    <a href="/" target="_blank">🌐 View Store</a>
    <a href="/logout">🚪 Logout</a>
  </div>
</aside>
<main class="main">
  <div class="topbar">
    <h1>Appointments</h1>
    <span style="font-size:13px;color:#888"
          th:text="${#lists.size(appointments)} + ' total'"></span>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-header">
        <h3>All Appointments</h3>
      </div>
      <table>
        <thead>
          <tr>
            <th>#</th><th>Customer</th><th>Phone</th><th>Email</th>
            <th>Date</th><th>Time</th><th>Purpose</th><th>Status</th><th>Update</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="a,i : ${appointments}">
            <td th:text="${i.count}"></td>
            <td style="font-weight:500" th:text="${a.customerName}"></td>
            <td><a th:href="'tel:' + ${a.phone}" th:text="${a.phone}"
                   style="color:var(--gold);text-decoration:none"></a></td>
            <td th:text="${a.email}"></td>
            <td th:text="${a.appointmentDate}"></td>
            <td th:text="${a.appointmentTime}"></td>
            <td th:text="${a.purpose}"></td>
            <td>
              <span class="badge" th:classappend="'badge-' + ${a.status}"
                    th:text="${a.status}"></span>
            </td>
            <td>
              <form th:action="@{/admin/appointments/update-status}" method="post" style="display:flex;align-items:center">
                <input type="hidden" name="id" th:value="${a.id}">
                <select name="status">
                  <option value="PENDING" th:selected="${a.status == 'PENDING'}">Pending</option>
                  <option value="CONFIRMED" th:selected="${a.status == 'CONFIRMED'}">Confirmed</option>
                  <option value="COMPLETED" th:selected="${a.status == 'COMPLETED'}">Completed</option>
                  <option value="CANCELLED" th:selected="${a.status == 'CANCELLED'}">Cancelled</option>
                </select>
                <button type="submit">✓</button>
              </form>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(appointments)}">
            <td colspan="9" style="text-align:center;padding:40px;color:#aaa">
              No appointments yet
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</main>
</body>
</html>
