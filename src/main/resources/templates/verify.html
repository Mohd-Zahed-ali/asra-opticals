<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verify OTP — Asra Optical Palace</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a96e;--dark:#1a1a1a;--cream:#f9f6f0;--border:#e0d5c5}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;display:grid;place-items:center;padding:20px}
.card{background:white;padding:50px 45px;border-radius:6px;max-width:440px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.1);text-align:center}
.icon{font-size:48px;margin-bottom:20px}
h1{font-family:'Cormorant Garamond',serif;font-size:32px;color:var(--dark);margin-bottom:8px;font-weight:400}
.sub{color:#888;font-size:14px;line-height:1.7;margin-bottom:30px}
.email-highlight{color:var(--dark);font-weight:600}
.otp-input{width:100%;padding:16px;border:2px solid var(--border);border-radius:4px;
  font-size:28px;text-align:center;letter-spacing:12px;font-weight:600;
  font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;background:#fdfbf8}
.otp-input:focus{border-color:var(--gold)}
.btn{width:100%;padding:14px;background:var(--dark);color:var(--gold);border:none;
  cursor:pointer;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  border-radius:3px;transition:background .2s;margin-top:18px}
.btn:hover{background:#2d2d2d}
.timer{color:#888;font-size:13px;margin-top:18px}
.timer span{color:var(--dark);font-weight:600}
.alert{padding:11px 15px;border-radius:3px;font-size:13px;margin-bottom:16px;
  border-left:3px solid #e74c3c;background:#fff0f0;color:#c0392b;text-align:left}
.back{display:block;margin-top:20px;color:var(--gold);font-size:13px;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📧</div>
  <h1>Verify Your Email</h1>
  <p class="sub">
    We've sent a 6-digit OTP to<br>
    <span class="email-highlight" th:text="${email}">your email</span><br>
    Enter it below to activate your account.
  </p>

  <div class="alert" th:if="${error}" th:text="${error}"></div>

  <form th:action="@{/verify}" method="post">
    <input class="otp-input" type="text" name="otp" placeholder="• • • • • •"
           maxlength="6" required autofocus inputmode="numeric" pattern="[0-9]{6}">
    <button type="submit" class="btn">Verify Account →</button>
  </form>

  <div class="timer">OTP expires in <span id="countdown">5:00</span></div>
  <a href="/register" class="back">← Start over / Resend OTP</a>
</div>

<script>
let seconds = 300;
const el = document.getElementById('countdown');
const t = setInterval(() => {
  seconds--;
  const m = Math.floor(seconds/60), s = seconds%60;
  el.textContent = m + ':' + String(s).padStart(2,'0');
  if(seconds <= 60) el.style.color = '#e74c3c';
  if(seconds <= 0){ clearInterval(t); el.textContent = 'Expired'; }
}, 1000);
</script>
</body>
</html>
