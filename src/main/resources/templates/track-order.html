<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Track Order — Asra Optical Palace</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a96e;--dark:#1a1a1a;--cream:#f9f6f0;--border:#e0d5c5;--mid:#4a4a4a}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh}
.topbar{background:var(--dark);height:65px;padding:0 50px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:20px;letter-spacing:2px;text-decoration:none}
.topbar a{color:#aaa;text-decoration:none;font-size:13px}.topbar a:hover{color:var(--gold)}
.container{max-width:700px;margin:50px auto;padding:0 25px}
.search-card{background:white;border:1px solid var(--border);border-radius:4px;padding:40px;text-align:center;margin-bottom:30px}
.search-card .icon{font-size:48px;margin-bottom:18px}
.search-card h1{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:400;margin-bottom:8px}
.search-card p{color:var(--mid);font-size:14px;margin-bottom:28px}
.input-row{display:flex;gap:0;max-width:440px;margin:0 auto}
.input-row input{flex:1;padding:13px 16px;border:1px solid var(--border);border-right:none;border-radius:3px 0 0 3px;font-size:14px;outline:none;background:#fdfbf8;font-family:'DM Sans',sans-serif}
.input-row input:focus{border-color:var(--gold)}
.input-row button{padding:13px 22px;background:var(--dark);color:var(--gold);border:none;cursor:pointer;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border-radius:0 3px 3px 0}
.result-card{background:white;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.result-header{background:var(--dark);padding:20px 25px;color:white}
.result-header h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400}
.badge{display:inline-block;padding:5px 14px;border-radius:2px;font-size:12px;letter-spacing:1px;font-weight:700;text-transform:uppercase;margin-top:8px}
.PENDING{background:#fff3cd;color:#856404}.CONFIRMED{background:#cce5ff;color:#004085}
.SHIPPED{background:#d4edda;color:#155724}.COMPLETED{background:#d1ecf1;color:#0c5460}
.CANCELLED{background:#f8d7da;color:#721c24}.READY_AT_STORE{background:#e2d9f3;color:#4a2c8a}
.result-body{padding:25px}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.meta-item label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#aaa;margin-bottom:3px}
.meta-item span{font-size:14px}
.progress{display:flex;gap:0;margin:25px 0}
.prog-step{flex:1;text-align:center;position:relative}
.prog-step::before{content:'';position:absolute;top:15px;left:50%;right:-50%;height:2px;background:#eee;z-index:0}
.prog-step:last-child::before{display:none}
.prog-dot{width:32px;height:32px;border-radius:50%;background:#eee;border:2px solid #eee;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  margin:0 auto 6px;position:relative;z-index:1}
.prog-step.done .prog-dot{background:var(--gold);border-color:var(--gold)}
.prog-step.done::before{background:var(--gold)}
.prog-label{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:#aaa}
.prog-step.done .prog-label{color:var(--dark)}
.items-section h4{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#aaa;margin-bottom:14px}
.item-row{display:flex;gap:14px;margin-bottom:12px;align-items:center}
.item-row img{width:60px;height:50px;object-fit:cover;border-radius:3px}
.not-found{text-align:center;padding:35px;color:var(--mid)}
.back-link{display:block;text-align:center;margin-top:25px;color:var(--gold);text-decoration:none;font-size:13px}
</style>
</head>
<body>
<nav class="topbar">
  <a href="/" class="logo">ASRA OPTICAL PALACE</a>
  <div style="display:flex;gap:20px"><a href="/">← Shop</a><a href="/my-orders">My Orders</a></div>
</nav>
<div class="container">
  <div class="search-card">
    <div class="icon">📍</div>
    <h1>Track Your Order</h1>
    <p>Enter your order number to see the current status and details</p>
    <form th:action="@{/track-order}" method="post">
      <div class="input-row">
        <input type="text" name="orderNumber" placeholder="e.g. ASRA-1716234567890" required>
        <button type="submit">Track</button>
      </div>
    </form>
  </div>

  <div class="not-found" th:if="${notFound}">
    ❌ Order not found. Please check your order number and try again.
  </div>

  <div class="result-card" th:if="${order != null}">
    <div class="result-header">
      <h2 th:text="${order.orderNumber}"></h2>
      <div class="badge" th:classappend="${order.status}" th:text="${order.status}"></div>
    </div>
    <div class="result-body">
      <div class="meta">
        <div class="meta-item"><label>Customer</label><span th:text="${order.customerName}"></span></div>
        <div class="meta-item"><label>Total</label><span>₹ <span th:text="${order.totalAmount}"></span></span></div>
        <div class="meta-item"><label>Payment</label><span th:text="${order.paymentMethod}"></span></div>
        <div class="meta-item"><label>Phone</label><span th:text="${order.phone}"></span></div>
        <div class="meta-item" style="grid-column:1/-1"><label>Address</label><span th:text="${order.address}"></span></div>
      </div>
      <!-- Progress -->
      <div class="progress">
        <div class="prog-step done"><div class="prog-dot">📋</div><div class="prog-label">Placed</div></div>
        <div class="prog-step" th:classappend="${order.status != 'PENDING'} ? 'done'">
          <div class="prog-dot">✓</div><div class="prog-label">Confirmed</div></div>
        <div class="prog-step" th:classappend="${order.status == 'READY_AT_STORE' or order.status == 'SHIPPED' or order.status == 'COMPLETED'} ? 'done'">
          <div class="prog-dot">🏪</div><div class="prog-label">Ready</div></div>
        <div class="prog-step" th:classappend="${order.status == 'SHIPPED' or order.status == 'COMPLETED'} ? 'done'">
          <div class="prog-dot">🚚</div><div class="prog-label">Shipped</div></div>
        <div class="prog-step" th:classappend="${order.status == 'COMPLETED'} ? 'done'">
          <div class="prog-dot">✅</div><div class="prog-label">Done</div></div>
      </div>
      <!-- Items -->
      <div class="items-section">
        <h4>Ordered Items</h4>
        <div th:each="item : ${order.items}" class="item-row">
          <img th:src="@{'/uploads/' + ${item.product.imageName}}" th:alt="${item.product.name}">
          <div>
            <div style="font-weight:500;font-size:14px" th:text="${item.product.name}"></div>
            <div style="font-size:12px;color:var(--mid)">Qty: <span th:text="${item.quantity}"></span> × ₹<span th:text="${item.price}"></span></div>
          </div>
          <div style="margin-left:auto;font-weight:600;font-size:14px">₹ <span th:text="${item.price * item.quantity}"></span></div>
        </div>
      </div>
    </div>
  </div>
  <a href="/" class="back-link">← Continue Shopping</a>
</div>
</body>
</html>
