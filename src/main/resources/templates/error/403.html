<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Access Denied — Asra Optical Palace</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f9f6f0;min-height:100vh;display:grid;place-items:center;text-align:center;padding:30px}
.num{font-family:'Cormorant Garamond',serif;font-size:120px;color:#e0d5c5;line-height:1;margin-bottom:20px;font-weight:600}
h1{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:400;color:#1a1a1a;margin-bottom:12px}
p{color:#888;font-size:15px;max-width:420px;line-height:1.7;margin:0 auto 30px}
.links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a{padding:12px 24px;background:#1a1a1a;color:#c9a96e;text-decoration:none;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border-radius:3px;transition:.2s}
a:hover{background:#2d2d2d}
a.outline{background:transparent;border:1px solid #e0d5c5;color:#4a4a4a}
a.outline:hover{border-color:#c9a96e;color:#c9a96e}
</style>
</head>
<body>
<div>
  <div class="num">403</div>
  <h1>Please Login First</h1>
  <p>You need to be logged in to add items to your cart or perform this action. Please login or create an account to continue shopping.</p>
  <div class="links">
    <a href="/login">Login</a>
    <a href="/register" class="outline">Create Account</a>
    <a href="/" class="outline">Go Home</a>
  </div>
</div>
</body>
</html>
