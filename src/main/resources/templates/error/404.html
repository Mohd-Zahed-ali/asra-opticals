<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page Not Found — Asra Optical Palace</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f9f6f0;min-height:100vh;display:grid;place-items:center;text-align:center;padding:30px}
.num{font-family:'Cormorant Garamond',serif;font-size:120px;color:#e0d5c5;line-height:1;margin-bottom:20px;font-weight:600}
h1{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:400;color:#1a1a1a;margin-bottom:12px}
p{color:#888;font-size:15px;max-width:400px;line-height:1.7;margin:0 auto 30px}
.links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a{padding:12px 24px;background:#1a1a1a;color:#c9a96e;text-decoration:none;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border-radius:3px}
a.outline{background:transparent;border:1px solid #e0d5c5;color:#4a4a4a}
</style>
</head>
<body>
<div>
  <div class="num">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <div class="links">
    <a href="/">Browse Collection</a>
    <a href="/track-order" class="outline">Track Order</a>
    <a href="/book-appointment" class="outline">Book Appointment</a>
  </div>
</div>
</body>
