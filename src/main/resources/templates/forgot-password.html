<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password — Asra Optical Palace</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a96e;--dark:#1a1a1a;--cream:#f9f6f0;--border:#e0d5c5}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;display:grid;place-items:center;padding:20px}
.card{background:white;padding:50px 45px;border-radius:6px;max-width:460px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.1)}
.brand{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold);
  letter-spacing:2px;text-align:center;margin-bottom:30px}
h1{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--dark);
  margin-bottom:6px;font-weight:400}
.sub{color:#888;font-size:13px;line-height:1.7;margin-bottom:28px}
label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;
  color:#4a4a4a;margin-bottom:6px;font-weight:500}
input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:3px;
  font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;background:#fdfbf8}
input:focus{border-color:var(--gold)}
.fg{margin-bottom:18px}
.btn{width:100%;padding:13px;background:var(--dark);color:var(--gold);border:none;
  cursor:pointer;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  border-radius:3px;transition:background .2s;margin-top:6px}
.btn:hover{background:#2d2d2d}
.alert{padding:11px 15px;border-radius:3px;font-size:13px;margin-bottom:18px;border-left:3px solid}
.alert-error{background:#fff0f0;color:#c0392b;border-color:#e74c3c}
.alert-success{background:#f0fff4;color:#155724;border-color:#27ae60}
.divider{border:none;border-top:1px solid var(--border);margin:25px 0}
.back{display:block;text-align:center;margin-top:18px;color:var(--gold);font-size:13px;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="brand">ASRA OPTICAL PALACE</div>

  <div th:if="${otpSent == null or otpSent == false}">
    <h1>Forgot Password?</h1>
    <p class="sub">Enter your registered email address. We'll send a 6-digit reset code.</p>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <form th:action="@{/forgot-password}" method="post">
      <div class="fg">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="your@email.com" required autofocus>
      </div>
      <button type="submit" class="btn">Send Reset OTP →</button>
    </form>
  </div>

  <!-- Step 2: Enter OTP + new password -->
  <div th:if="${otpSent != null and otpSent == true}">
    <h1>Reset Password</h1>
    <p class="sub">Enter the OTP sent to <strong th:text="${email}"></strong> and choose a new password.</p>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/reset-password}" method="post">
      <input type="hidden" name="email" th:value="${email}">
      <div class="fg">
        <label>OTP Code</label>
        <input type="text" name="otp" placeholder="Enter 6-digit OTP" maxlength="6"
               required autofocus inputmode="numeric">
      </div>
      <div class="fg">
        <label>New Password</label>
        <input type="password" name="newPassword" placeholder="Min 6 characters" required minlength="6">
      </div>
      <button type="submit" class="btn">Reset Password →</button>
    </form>
  </div>

  <hr class="divider">
  <a href="/login" class="back">← Back to Login</a>
</div>
</body>
</html>
