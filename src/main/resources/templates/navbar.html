<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!-- This file is a Thymeleaf fragment - included in other templates -->
<body>
<nav th:fragment="navbar" class="navbar">
  <a href="/" class="nav-logo">ASRA OPTICAL PALACE</a>
  <div class="nav-links">
    <a href="/?category=Glasses">Glasses</a>
    <a href="/?category=Sunglasses">Sunglasses</a>
    <a href="/?category=Contact+Lenses">Lenses</a>
    <a href="/book-appointment">Appointment</a>
    <a href="/track-order">Track</a>
  </div>
  <div class="nav-right">
    <form action="/" method="get" class="search-form">
      <input type="text" name="keyword" placeholder="Search…">
      <button type="submit">🔍</button>
    </form>
    <a href="/wishlist" title="Wishlist">♡</a>
    <a href="/cart" class="cart-link">
      🛒 <span th:if="${cartCount > 0}" class="cart-badge" th:text="${cartCount}"></span>
    </a>
    <a href="/login" sec:authorize="isAnonymous()" class="btn-login">Login</a>
    <a href="/profile" sec:authorize="isAuthenticated()" class="btn-login">
      👤 <span sec:authentication="name"></span>
    </a>
    <a href="/admin/dashboard" sec:authorize="hasRole('ADMIN')" class="btn-admin">Admin ⚙️</a>
    
    
    <form action="/logout" method="post" style="margin:0;padding:0">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" sec:authorize="isAuthenticated()" class="btn-logout" style="background:none;border:none;cursor:pointer;color:#e74c3c;font-size:13px;padding:10px 18px;width:100%;text-align:left">🚪 Logout</button>
        </form>
  </div>
</nav>
</body>
</html>
