<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wishlist — Asra Optical Palace</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a96e;--dark:#1a1a1a;--cream:#f9f6f0;--border:#e0d5c5;--mid:#4a4a4a}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh}
.topbar{background:var(--dark);height:65px;padding:0 50px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:20px;letter-spacing:2px;text-decoration:none}
.topbar a{color:#aaa;text-decoration:none;font-size:13px}.topbar a:hover{color:var(--gold)}
.page-header{background:white;padding:28px 60px;border-bottom:1px solid var(--border)}
.page-header h1{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:400}
.grid{max-width:1200px;margin:35px auto;padding:0 30px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
.card{background:white;border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:box-shadow .3s}
.card:hover{box-shadow:0 8px 25px rgba(0,0,0,.1)}
.card img{width:100%;height:220px;object-fit:cover;transition:transform .4s}
.card:hover img{transform:scale(1.04)}
.card-body{padding:16px}
.brand{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;margin-bottom:6px}
.price{font-size:16px;font-weight:600;margin-bottom:14px}
.card-actions{display:flex;gap:8px}
.btn-cart{flex:1;padding:10px;background:var(--dark);color:var(--gold);border:none;cursor:pointer;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border-radius:3px}
.btn-remove{padding:10px 14px;background:white;border:1px solid var(--border);border-radius:3px;cursor:pointer;font-size:14px;color:#ccc}
.btn-remove:hover{color:#e74c3c;border-color:#e74c3c}
.empty{text-align:center;padding:100px 30px;grid-column:1/-1}
.empty .icon{font-size:64px;margin-bottom:20px}
.empty h2{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;margin-bottom:10px}
.empty p{color:var(--mid);font-size:14px;margin-bottom:25px}
.btn{display:inline-block;padding:13px 28px;background:var(--dark);color:var(--gold);text-decoration:none;font-size:13px;font-weight:600;letter-spacing:1px;border-radius:3px}
</style>
</head>
<body>
<nav class="topbar">
  <a href="/" class="logo">ASRA OPTICAL PALACE</a>
  <div style="display:flex;gap:20px">
    <a href="/">← Shop</a><a href="/cart">🛒 Cart</a><a href="/profile">Profile</a>
  </div>
</nav>
<div class="page-header"><h1>Your Wishlist ❤️</h1></div>
<div class="grid">
  <div th:each="product : ${products}" class="card">
    <a th:href="@{/product/{id}(id=${product.id})}">
      <img th:src="@{'/uploads/' + ${product.imageName}}" th:alt="${product.name}">
    </a>
    <div class="card-body">
      <div class="brand" th:text="${product.brand}"></div>
      <h3 th:text="${product.name}"></h3>
      <div class="price">₹ <span th:text="${product.price}"></span></div>
      <div class="card-actions">
        <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post" style="flex:1">
          <button type="submit" class="btn-cart" style="width:100%">Add to Cart</button>
        </form>
        <a th:href="@{'/wishlist/remove/' + ${product.id}}" class="btn-remove" title="Remove">✕</a>
      </div>
    </div>
  </div>
  <div class="empty" th:if="${#lists.isEmpty(products)}">
    <div class="icon">❤️</div>
    <h2>Your wishlist is empty</h2>
    <p>Save frames you love and come back to them later.</p>
    <a href="/" class="btn">Browse Collection →</a>
  </div>
</div>
</body>
</html>
